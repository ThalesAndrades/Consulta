<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login | Dr. Saúde Online</title>
  <style>
    body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .box{background:#fff;border-radius:14px;padding:44px 40px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:360px;width:100%}
    h1{font-size:20px;margin-bottom:8px;color:#1a3a4a}
    p{font-size:13px;color:#6b7280;margin-bottom:24px}
    input{width:100%;padding:12px 14px;border:1.5px solid #e0e4ea;border-radius:10px;font-size:15px;margin-bottom:14px;outline:none;font-family:inherit}
    input:focus{border-color:#1a3a4a}
    button{width:100%;padding:13px;background:#1a3a4a;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-family:inherit}
    button:hover{opacity:.88}
  </style>
</head>
<body>
<div class="box">
  <h1>🔐 Painel Admin</h1>
  <p>Dr. Saúde Online</p>
  <form method="GET">
    <input type="password" name="senha" placeholder="Senha de acesso" required autofocus>
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
